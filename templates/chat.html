{% extends "base.html" %}
{% block content %}
<section class="chat-shell panel">
  <div class="chat-header">
    <div>
      <p class="eyebrow">Direct Chat</p>
      <h2>{{ other_user.name }}</h2>
    </div>
  </div>
  <div id="chatBox" class="chat-box">
    {% for msg in messages %}
      <div class="msg {% if msg.sender|string == current_user.id|string %}me{% endif %}">{{ msg.message }}</div>
    {% endfor %}
  </div>
  <div class="chat-input-row">
    <input id="messageInput" placeholder="Type message...">
    <button id="sendBtn" class="primary">Send</button>
  </div>
</section>
<script>window.chatOtherId='{{ other_id }}';</script>
<script defer src="{{ url_for('static', filename='js/chat.js') }}"></script>
{% endblock %}
